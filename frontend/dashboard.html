<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | AI Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">

        <div class="dashboard-header">
            <h1>AI Complaint Dashboard</h1>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <div class="dashboard-actions">
            <button onclick="goToComplaint()" class="primary-btn">
                Submit New Complaint
            </button>

            <button onclick="loadComplaints()" class="secondary-btn">
                View My Complaints
            </button>
        </div>

        <div id="complaintList" class="complaint-list"></div>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>
